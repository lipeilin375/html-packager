<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>静态网站打包器 - Tauri 2.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📦 静态网站 → 桌面应用打包器</h1>
        <p>上传 HTML 压缩包及图标，选择目标平台，自动生成可执行文件并发布到 Release</p>

        <form id="buildForm">
            <div class="form-group">
                <label>应用名称 *</label>
                <input type="text" id="appName" placeholder="例如：MyApp" required>
            </div>

            <div class="form-group">
                <label>版本号 *</label>
                <input type="text" id="version" placeholder="例如：1.0.0" required>
            </div>

            <div class="form-group">
                <label>包名 (Bundle Identifier) *</label>
                <input type="text" id="bundleId" placeholder="例如：com.example.myapp" required>
            </div>

            <div class="form-group">
                <label>目标平台 *</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" value="windows" checked> Windows (.exe/.msi)</label>
                    <label><input type="checkbox" value="linux" checked> Linux (.deb/.appimage)</label>
                    <label><input type="checkbox" value="macos" checked> macOS (.dmg)</label>
                </div>
            </div>

            <div class="form-group">
                <label>应用图标 (PNG/JPG，建议 ≥1024x1024) *</label>
                <input type="file" id="icon" accept="image/png,image/jpeg" required>
            </div>

            <div class="form-group">
                <label>静态网站压缩包 (ZIP，≤20MB) *</label>
                <input type="file" id="websiteZip" accept=".zip" required>
                <small>压缩包内应包含 index.html 及其他资源文件，直接放在根目录或单层文件夹均可</small>
            </div>

            <div class="form-group">
                <label>GitHub Personal Access Token *</label>
                <input type="password" id="githubToken" placeholder="需要 repo 权限" required>
                <small>令牌需具备 <code>repo</code> 和 <code>workflow</code> 权限</small>
            </div>

            <button type="submit" id="submitBtn">🚀 提交打包任务</button>
        </form>

        <div id="message" class="message"></div>
        <div id="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
