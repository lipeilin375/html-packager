<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML → Tauri 打包平台</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="topbar">
    <div class="brand">
      ⚡ HTML Packager → Tauri 2.0
    </div>

    <div class="nav">
      <a href="./index.html">上传</a>
      <a href="./status.html">任务状态</a>
      <a href="./releases.html">下载中心</a>
    </div>
  </div>

  <div class="container">

    <div class="hero">
      <h1>一键将 HTML 打包成桌面应用</h1>
      <p>基于 GitHub Actions + Tauri 2.0 自动构建 Windows / Linux / macOS</p>
    </div>

    <!-- GitHub Token -->
    <div class="card">
      <h2>🔐 GitHub 认证</h2>
      <p class="hint">用于上传文件与触发构建（建议使用 Fine-grained Token）</p>

      <input id="token" type="password" placeholder="ghp_xxxxxxxxxxxxx" />
    </div>

    <!-- App Info -->
    <div class="card">
      <h2>📦 应用信息</h2>

      <div class="grid">

        <div>
          <label>应用名称</label>
          <input id="appName" placeholder="My Desktop App" />
        </div>

        <div>
          <label>版本号</label>
          <input id="version" value="1.0.0" />
        </div>

        <div>
          <label>包名 (identifier)</label>
          <input id="identifier" value="com.example.app" />
        </div>

      </div>
    </div>

    <!-- Upload -->
    <div class="card">
      <h2>📁 上传内容</h2>

      <div class="upload-box">

        <div>
          <label>HTML 压缩包 (.zip ≤ 20MB)</label>
          <input id="zip" type="file" accept=".zip" />
        </div>

        <div>
          <label>应用图标 (PNG 512×512)</label>
          <input id="icon" type="file" accept="image/png" />
        </div>

      </div>
    </div>

    <!-- Platforms -->
    <div class="card">
      <h2>🖥️ 目标平台</h2>

      <div class="platforms">

        <label>
          <input type="checkbox" value="windows" checked />
          Windows
        </label>

        <label>
          <input type="checkbox" value="linux" checked />
          Linux
        </label>

        <label>
          <input type="checkbox" value="macos" checked />
          macOS
        </label>

      </div>
    </div>

    <!-- Action -->
    <div class="card action-card">

      <button id="buildBtn">
        🚀 开始打包
      </button>

      <div id="status" class="status idle">
        等待提交任务...
      </div>

      <div class="tips">
        <p>⚠️ 构建由 GitHub Actions 执行，通常需要 2~8 分钟</p>
        <p>📌 任务完成后可在「下载中心」获取安装包</p>
      </div>

    </div>

  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>

</body>

</html>
