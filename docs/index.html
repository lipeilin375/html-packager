<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML 打包器</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🚀 HTML 静态网站打包器</h1>
    <p class="subtitle">将静态 HTML 网站打包为桌面应用（Tauri 2.0）</p>

    <form id="packForm">
      <div class="section">
        <h2>应用信息</h2>
        <div class="field">
          <label for="appName">应用名称 <span class="req">*</span></label>
          <input type="text" id="appName" placeholder="MyApp" required>
        </div>
        <div class="field">
          <label for="version">版本号 <span class="req">*</span></label>
          <input type="text" id="version" placeholder="1.0.0" pattern="\d+\.\d+\.\d+" required>
        </div>
        <div class="field">
          <label for="identifier">包名（Bundle ID）<span class="req">*</span></label>
          <input type="text" id="identifier" placeholder="com.example.myapp" required>
        </div>
        <div class="field">
          <label for="author">开发者名称 <span class="req">*</span></label>
          <input type="text" id="author" placeholder="Your Name" required>
        </div>
      </div>

      <div class="section">
        <h2>目标平台</h2>
        <div class="platforms">
          <label class="platform-option">
            <input type="checkbox" name="platform" value="windows"> Windows (.exe / .msi)
          </label>
          <label class="platform-option">
            <input type="checkbox" name="platform" value="linux"> Linux (.deb / .AppImage)
          </label>
          <label class="platform-option">
            <input type="checkbox" name="platform" value="linux-arm64"> Linux ARM64 (.deb / .AppImage)
          </label>
          <label class="platform-option">
            <input type="checkbox" name="platform" value="macos"> macOS (.dmg)
          </label>
        </div>
      </div>

      <div class="section">
        <h2>上传文件</h2>
        <div class="field">
          <label for="zipFile">网站压缩包（ZIP，≤20MB）<span class="req">*</span></label>
          <input type="file" id="zipFile" accept=".zip" required>
          <span class="hint">包含 index.html 的 ZIP 压缩包</span>
        </div>
        <div class="field">
          <label for="iconFile">应用图标（PNG，建议 1024×1024）<span class="req">*</span></label>
          <input type="file" id="iconFile" accept=".png,.jpg,.jpeg,.webp" required>
        </div>
      </div>

      <div class="section">
        <h2>GitHub 配置</h2>
        <div class="field">
          <label for="token">GitHub Token <span class="req">*</span></label>
          <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxx" required>
          <span class="hint">需要 repo 和 workflow 权限</span>
        </div>
      </div>

      <button type="submit" id="submitBtn">开始打包</button>
    </form>

    <div id="status" class="status hidden"></div>

    <div id="releases" class="releases hidden">
      <h2>📦 最新构建</h2>
      <div id="releaseList"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
