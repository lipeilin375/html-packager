name: Tauri Build System

on:
  workflow_dispatch:
    inputs:
      job:
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: tauri-build-${{ github.event.inputs.job }}
  cancel-in-progress: false


jobs:

  prepare:
    runs-on: ubuntu-latest

    outputs:
      job: ${{ steps.meta.outputs.job }}
      name: ${{ steps.meta.outputs.name }}
      version: ${{ steps.meta.outputs.version }}
      identifier: ${{ steps.meta.outputs.identifier }}
      platforms: ${{ steps.meta.outputs.platforms }}

    steps:
      - uses: actions/checkout@v4

      - name: Read Job File
        id: meta
        run: |

          JOB="${{ github.event.inputs.job }}"
          FILE="upload/jobs/${JOB}.json"

          echo "job=$JOB" >> $GITHUB_OUTPUT

          NAME=$(jq -r '.name' "$FILE")
          VERSION=$(jq -r '.version' "$FILE")
          IDENTIFIER=$(jq -r '.identifier' "$FILE")

          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "identifier=$IDENTIFIER" >> $GITHUB_OUTPUT

          echo "platforms=$(jq -c '.platforms' "$FILE")" >> $GITHUB_OUTPUT


  build:
    needs: prepare

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos

    runs-on: ${{ matrix.os }}

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev \
            build-essential curl wget file \
            libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Load Job
        run: |
          JOB="${{ github.event.inputs.job }}"
          echo "JOB=$JOB" >> $GITHUB_ENV

      - name: Prepare Workspace
        run: |
          mkdir -p app
          cd app
          npm init -y

      - name: Install Dependencies
        run: |
          cd app
          npm install @tauri-apps/api @tauri-apps/cli

      - name: Extract HTML
        run: |
          unzip upload/html/${JOB}.zip -d app/dist

      - name: Generate Multi-platform Icons
        run: |
          mkdir -p app/icons

          ICON_SRC="upload/icons/${JOB}.png"

          if [ ! -f "$ICON_SRC" ]; then
            echo "⚠️ Icon not found, skipping icon generation"
            exit 0
          fi

          npx tauri icon "$ICON_SRC" --output app/icons

      - name: Generate Tauri Config
        run: |
          cat > app/tauri.conf.json <<EOF
          {
            "productName": "${{ needs.prepare.outputs.name }}",
            "version": "${{ needs.prepare.outputs.version }}",
            "identifier": "${{ needs.prepare.outputs.identifier }}",
            "build": {
              "frontendDist": "../dist"
            },
            "bundle": {
              "active": true,
              "targets": ["all"],
              "icon": [
                "icons/icon.png",
                "icons/icon.ico",
                "icons/icon.icns"
              ]
            }
          }
          EOF

      - name: Build App (Tauri)
        run: |
          cd app
          npx tauri build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: |
            app/src-tauri/target/release/bundle/**/*


  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.job }}
          files: |
            **/*.msi
            **/*.exe
            **/*.AppImage
            **/*.deb
            **/*.dmg

      - name: Update releases index
        run: |
          JOB="${{ github.event.inputs.job }}"
          FILE="upload/jobs/${JOB}.json"

          NAME=$(jq -r '.name' "$FILE")
          VERSION=$(jq -r '.version' "$FILE")

          RELEASE_FILE="releases/index.json"

          mkdir -p releases

          if [ ! -f "$RELEASE_FILE" ]; then
            echo "[]" > "$RELEASE_FILE"
          fi

          jq ". += [{
            \"id\": \"$JOB\",
            \"name\": \"$NAME\",
            \"version\": \"$VERSION\",
            \"windows\": {
              \"msi\": \"https://github.com/${{ github.repository }}/releases/download/$JOB/app.msi\",
              \"exe\": \"https://github.com/${{ github.repository }}/releases/download/$JOB/app.exe\"
            },
            \"linux\": {
              \"appimage\": \"https://github.com/${{ github.repository }}/releases/download/$JOB/app.AppImage\",
              \"deb\": \"https://github.com/${{ github.repository }}/releases/download/$JOB/app.deb\"
            },
            \"macos\": {
              \"dmg\": \"https://github.com/${{ github.repository }}/releases/download/$JOB/app.dmg\"
            }
          }]" "$RELEASE_FILE" > tmp.json

          mv tmp.json "$RELEASE_FILE"

      - name: Commit release index
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add releases/index.json

          git commit -m "update release index $JOB" || echo "no changes"

          git push