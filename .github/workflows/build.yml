name: Build Tauri App

on:
  workflow_dispatch:
    inputs:
      meta_path:
        description: 'Path to metadata JSON in repo'
        required: true
      zip_path:
        description: 'Path to uploaded ZIP in repo'
        required: true
      icon_path:
        description: 'Path to uploaded icon in repo'
        required: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      app_name: ${{ steps.meta.outputs.app_name }}
      version: ${{ steps.meta.outputs.version }}
      identifier: ${{ steps.meta.outputs.identifier }}
      author: ${{ steps.meta.outputs.author }}
      platforms: ${{ steps.meta.outputs.platforms }}
    steps:
      - uses: actions/checkout@v4

      - name: Read metadata
        id: meta
        run: |
          META=$(cat "${{ github.event.inputs.meta_path }}")
          echo "app_name=$(echo $META | jq -r '.appName')" >> $GITHUB_OUTPUT
          echo "version=$(echo $META | jq -r '.version')" >> $GITHUB_OUTPUT
          echo "identifier=$(echo $META | jq -r '.identifier')" >> $GITHUB_OUTPUT
          echo "author=$(echo $META | jq -r '.author')" >> $GITHUB_OUTPUT
          echo "platforms=$(echo $META | jq -c '.platforms')" >> $GITHUB_OUTPUT

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-zip
          path: ${{ github.event.inputs.zip_path }}

      - name: Upload icon artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-icon
          path: ${{ github.event.inputs.icon_path }}

  build-windows:
    needs: prepare
    if: ${{ contains(fromJson(needs.prepare.outputs.platforms), 'windows') }}
    runs-on: windows-latest
    steps:
      - name: Download source files
        uses: actions/download-artifact@v4
        with:
          name: source-zip
          path: ./upload-zip

      - name: Download icon
        uses: actions/download-artifact@v4
        with:
          name: source-icon
          path: ./upload-icon

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Create Tauri project
        shell: bash
        run: |
          npm create tauri-app@latest myapp -- --template vanilla --manager npm --yes
        env:
          CI: true

      - name: Install dependencies
        working-directory: myapp
        run: npm install

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Generate icons
        shell: bash
        run: |
          ICON_FILE=$(ls ./upload-icon/*)
          cd myapp
          npm run tauri icon "../$ICON_FILE"

      - name: Extract website ZIP
        shell: bash
        run: |
          ZIP_FILE=$(ls ./upload-zip/*)
          mkdir -p myapp/src
          unzip -o "$ZIP_FILE" -d myapp/src/

      - name: Configure tauri.conf.json
        shell: bash
        run: |
          CONFIG=myapp/src-tauri/tauri.conf.json
          jq \
            --arg name "${{ needs.prepare.outputs.app_name }}" \
            --arg version "${{ needs.prepare.outputs.version }}" \
            --arg id "${{ needs.prepare.outputs.identifier }}" \
            '.productName = $name | .version = $version | .identifier = $id |
             .bundle.targets = ["nsis"] |
             .bundle.createUpdaterArtifacts = false' \
            "$CONFIG" > tmp.json && mv tmp.json "$CONFIG"

      - name: Set author in Cargo.toml
        shell: bash
        run: |
          sed -i "s/^authors = .*/authors = [\"${{ needs.prepare.outputs.author }}\"]/" myapp/src-tauri/Cargo.toml

      - name: Build
        working-directory: myapp
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            myapp/src-tauri/target/release/bundle/nsis/*.exe
            myapp/src-tauri/target/release/bundle/msi/*.msi

  build-linux:
    needs: prepare
    if: ${{ contains(fromJson(needs.prepare.outputs.platforms), 'linux') }}
    runs-on: ubuntu-latest
    steps:
      - name: Download source files
        uses: actions/download-artifact@v4
        with:
          name: source-zip
          path: ./upload-zip

      - name: Download icon
        uses: actions/download-artifact@v4
        with:
          name: source-icon
          path: ./upload-icon

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            unzip \
            jq

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Create Tauri project
        run: npm create tauri-app@latest myapp -- --template vanilla --manager npm --yes
        env:
          CI: true

      - name: Install dependencies
        working-directory: myapp
        run: npm install

      - name: Generate icons
        run: |
          ICON_FILE=$(ls ./upload-icon/*)
          cd myapp
          npx tauri icon "../$ICON_FILE"

      - name: Extract website ZIP
        run: |
          ZIP_FILE=$(ls ./upload-zip/*)
          mkdir -p myapp/src
          unzip -o "$ZIP_FILE" -d myapp/src/

      - name: Configure tauri.conf.json
        run: |
          CONFIG=myapp/src-tauri/tauri.conf.json
          jq \
            --arg name "${{ needs.prepare.outputs.app_name }}" \
            --arg version "${{ needs.prepare.outputs.version }}" \
            --arg id "${{ needs.prepare.outputs.identifier }}" \
            '.productName = $name | .version = $version | .identifier = $id |
             .bundle.targets = ["deb","appimage"] |
             .bundle.createUpdaterArtifacts = false' \
            "$CONFIG" > tmp.json && mv tmp.json "$CONFIG"

      - name: Set author in Cargo.toml
        run: |
          sed -i "s/^authors = .*/authors = [\"${{ needs.prepare.outputs.author }}\"]/" myapp/src-tauri/Cargo.toml

      - name: Build
        working-directory: myapp
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            myapp/src-tauri/target/release/bundle/deb/*.deb
            myapp/src-tauri/target/release/bundle/appimage/*.AppImage

  build-macos:
    needs: prepare
    if: ${{ contains(fromJson(needs.prepare.outputs.platforms), 'macos') }}
    runs-on: macos-latest
    steps:
      - name: Download source files
        uses: actions/download-artifact@v4
        with:
          name: source-zip
          path: ./upload-zip

      - name: Download icon
        uses: actions/download-artifact@v4
        with:
          name: source-icon
          path: ./upload-icon

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Create Tauri project
        run: npm create tauri-app@latest myapp -- --template vanilla --manager npm --yes
        env:
          CI: true

      - name: Install dependencies
        working-directory: myapp
        run: npm install

      - name: Generate icons
        run: |
          ICON_FILE=$(ls ./upload-icon/*)
          cd myapp
          npx tauri icon "../$ICON_FILE"

      - name: Extract website ZIP
        run: |
          ZIP_FILE=$(ls ./upload-zip/*)
          mkdir -p myapp/src
          unzip -o "$ZIP_FILE" -d myapp/src/

      - name: Configure tauri.conf.json
        run: |
          CONFIG=myapp/src-tauri/tauri.conf.json
          jq \
            --arg name "${{ needs.prepare.outputs.app_name }}" \
            --arg version "${{ needs.prepare.outputs.version }}" \
            --arg id "${{ needs.prepare.outputs.identifier }}" \
            '.productName = $name | .version = $version | .identifier = $id |
             .bundle.targets = ["dmg"] |
             .bundle.createUpdaterArtifacts = false' \
            "$CONFIG" > tmp.json && mv tmp.json "$CONFIG"

      - name: Set author in Cargo.toml
        run: |
          sed -i "" "s/^authors = .*/authors = [\"${{ needs.prepare.outputs.author }}\"]/" myapp/src-tauri/Cargo.toml

      - name: Build
        working-directory: myapp
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: myapp/src-tauri/target/release/bundle/dmg/*.dmg

  release:
    needs: [prepare, build-windows, build-linux, build-macos]
    if: always() && (needs.build-windows.result == 'success' || needs.build-linux.result == 'success' || needs.build-macos.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-artifacts'
          merge-multiple: true
          path: ./dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.app_name }}-v${{ needs.prepare.outputs.version }}-${{ github.run_id }}
          name: "${{ needs.prepare.outputs.app_name }} v${{ needs.prepare.outputs.version }}"
          body: |
            **App:** ${{ needs.prepare.outputs.app_name }}
            **Version:** ${{ needs.prepare.outputs.version }}
            **Author:** ${{ needs.prepare.outputs.author }}
          files: ./dist/**
          fail_on_unmatched_files: false
