name: Tauri Build System

on:
  workflow_dispatch:
    inputs:
      job:
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: tauri-build-${{ github.event.inputs.job }}
  cancel-in-progress: false


jobs:

  prepare:
    runs-on: ubuntu-latest

    outputs:
      job: ${{ steps.meta.outputs.job }}
      name: ${{ steps.meta.outputs.name }}
      version: ${{ steps.meta.outputs.version }}
      identifier: ${{ steps.meta.outputs.identifier }}

    steps:
      - uses: actions/checkout@v4

      - name: Read Job File
        id: meta
        run: |
          JOB="${{ github.event.inputs.job }}"
          FILE="upload/jobs/${JOB}.json"

          echo "job=$JOB" >> $GITHUB_OUTPUT

          NAME=$(jq -r '.name' "$FILE")
          VERSION=$(jq -r '.version' "$FILE")
          IDENTIFIER=$(jq -r '.identifier' "$FILE")

          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "identifier=$IDENTIFIER" >> $GITHUB_OUTPUT


  build:
    needs: prepare

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos

    runs-on: ${{ matrix.os }}

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      # Linux依赖
      - name: Install Linux deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev \
            build-essential curl wget file \
            libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      # workspace
      - name: Setup workspace
        run: mkdir -p app

      - name: Init npm project
        working-directory: app
        run: npm init -y

      - name: Install dependencies
        working-directory: app
        run: npm install @tauri-apps/api @tauri-apps/cli unzipper

      - name: Extract HTML
        env:
          JOB: ${{ github.event.inputs.job }}
        run: |
          node scripts/extract.js

      # icon
      - name: Generate icons
        run: |
          mkdir -p app/icons

          ICON="upload/icons/${{ github.event.inputs.job }}.png"

          if [ -f "$ICON" ]; then
            npx tauri icon "$ICON" --output app/icons || true
          else
            echo "skip icon"
          fi

      # tauri config
      - name: Generate tauri config
        working-directory: app
        run: |
          cat > tauri.conf.json <<EOF
          {
            "productName": "${{ needs.prepare.outputs.name }}",
            "version": "${{ needs.prepare.outputs.version }}",
            "identifier": "${{ needs.prepare.outputs.identifier }}",
            "build": {
              "frontendDist": "../dist"
            },
            "bundle": {
              "active": true,
              "targets": ["all"],
              "icon": [
                "icons/icon.png",
                "icons/icon.ico",
                "icons/icon.icns"
              ]
            }
          }
          EOF

      # build
      - name: Build App
        working-directory: app
        run: npx tauri build

      # upload
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: app/src-tauri/target/release/bundle/**/*


  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.job }}
          files: |
            **/*.msi
            **/*.exe
            **/*.AppImage
            **/*.deb
            **/*.dmg

      - name: Update release index
        run: |
          JOB="${{ github.event.inputs.job }}"
          FILE="upload/jobs/${JOB}.json"

          NAME=$(jq -r '.name' "$FILE")
          VERSION=$(jq -r '.version' "$FILE")

          mkdir -p releases

          if [ ! -f releases/index.json ]; then
            echo "[]" > releases/index.json
          fi

          jq ". += [{
            \"id\": \"$JOB\",
            \"name\": \"$NAME\",
            \"version\": \"$VERSION\",
            \"windows\": {
              \"msi\": \"https://github.com/${{ github.repository }}/releases/download/$JOB/app.msi\",
              \"exe\": \"https://github.com/${{ github.repository }}/releases/download/$JOB/app.exe\"
            },
            \"linux\": {
              \"appimage\": \"https://github.com/${{ github.repository }}/releases/download/$JOB/app.AppImage\",
              \"deb\": \"https://github.com/${{ github.repository }}/releases/download/$JOB/app.deb\"
            },
            \"macos\": {
              \"dmg\": \"https://github.com/${{ github.repository }}/releases/download/$JOB/app.dmg\"
            }
          }]" releases/index.json > tmp.json

          mv tmp.json releases/index.json

      - name: Commit index
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add releases/index.json
          git commit -m "update release index $JOB" || echo "no changes"
          git push
