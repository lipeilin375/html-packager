name: Tauri Static Website Builder

on:
  workflow_dispatch:
    inputs:
      metadata_file:
        description: '上传的元数据文件路径 (upload/build-*.json)'
        required: true
        type: string

env:
  TAURI_PRIVATE_KEY: ''
  TAURI_KEY_PASSWORD: ''

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      app_name: ${{ steps.meta.outputs.app_name }}
      version: ${{ steps.meta.outputs.version }}
      platforms: ${{ steps.meta.outputs.platforms }}
      build_id: ${{ steps.meta.outputs.build_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read metadata
        id: meta
        run: |
          METADATA=$(cat ${{ github.event.inputs.metadata_file }})
          APP_NAME=$(echo "$METADATA" | jq -r '.app_name')
          VERSION=$(echo "$METADATA" | jq -r '.version')
          PLATFORMS=$(echo "$METADATA" | jq -c '.platforms')
          BUILD_ID=$(echo "$METADATA" | jq -r '.timestamp')
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "platforms=$PLATFORMS" >> $GITHUB_OUTPUT
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "METADATA_FILE=${{ github.event.inputs.metadata_file }}" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download & extract website zip
        run: |
          ZIP_PATH=$(jq -r '.zip_file' ${{ github.event.inputs.metadata_file }})
          mkdir -p website_src
          curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
               -H "Accept: application/vnd.github.v3.raw" \
               -L "https://api.github.com/repos/${{ github.repository }}/contents/${ZIP_PATH}" -o upload.zip
          if [ ! -s upload.zip ]; then
            echo "ERROR: Downloaded zip file is empty or missing"
            exit 1
          fi
          unzip -q upload.zip -d website_src
          if [ $(ls -1 website_src | wc -l) -eq 1 ] && [ -d "website_src/$(ls website_src)" ]; then
            mv website_src/*/* website_src/
          fi
          if [ ! -f website_src/index.html ]; then
            echo "ERROR: No index.html found"
            exit 1
          fi
          echo "✅ Website extracted"

      - name: Generate Tauri icons
        run: |
          npm install -g @tauri-apps/cli@latest
          ICON_PATH=$(jq -r '.icon_file' ${{ github.event.inputs.metadata_file }})
          curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
               -H "Accept: application/vnd.github.v3.raw" \
               -L "https://api.github.com/repos/${{ github.repository }}/contents/${ICON_PATH}" -o input_icon.png
          if [ ! -f input_icon.png ]; then
            echo "ERROR: Icon download failed"
            exit 1
          fi
          mkdir -p generated_icons
          npx tauri icon input_icon.png -o generated_icons
          if [ ! -d generated_icons ] || [ -z "$(ls -A generated_icons)" ]; then
            echo "ERROR: Icon generation failed"
            exit 1
          fi
          echo "✅ Icons generated"

      - name: Prepare Tauri resources artifact
        run: |
          mkdir -p tauri_resources/src
          mkdir -p tauri_resources/icons
          cp -r website_src/* tauri_resources/src/
          cp -r generated_icons/* tauri_resources/icons/
          cp ${{ github.event.inputs.metadata_file }} tauri_resources/build_metadata.json
          tar -czf resources.tar.gz -C tauri_resources .
          echo "✅ Resources prepared"

      - name: Upload resources artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauri-resources
          path: resources.tar.gz

  # ===================== Windows =====================
  build-windows:
    needs: setup
    if: contains(fromJson(needs.setup.outputs.platforms), 'windows')
    runs-on: windows-latest
    steps:
      - name: Download resources
        uses: actions/download-artifact@v4
        with:
          name: tauri-resources
      - name: Extract resources
        run: tar -xzf resources.tar.gz
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build Tauri app (Windows)
        shell: bash
        run: |
          APP_NAME=$(jq -r '.app_name' build_metadata.json)
          VERSION=$(jq -r '.version' build_metadata.json)
          BUNDLE_ID=$(jq -r '.bundle_id' build_metadata.json)
          
          # 手动创建 Tauri 项目，避免 create-tauri-app 的版本锁定
          mkdir -p tmpapp/src-tauri/icons
          mkdir -p tmpapp/src
          
          # 复制静态文件和图标
          cp -r src/* tmpapp/src/
          cp -r icons/* tmpapp/src-tauri/icons/
          
          # 创建 package.json
          cat > tmpapp/package.json << EOF
          {
            "name": "$APP_NAME",
            "version": "$VERSION",
            "private": true,
            "scripts": {
              "tauri": "tauri"
            },
            "devDependencies": {
              "@tauri-apps/cli": "^2.0.0"
            }
          }
          EOF
          
          # 创建 src-tauri/Cargo.toml (固定 tauri 2.11.2)
          cat > tmpapp/src-tauri/Cargo.toml << EOF
          [package]
          name = "$APP_NAME"
          version = "$VERSION"
          description = "A Tauri App"
          authors = ["you"]
          edition = "2021"
          
          [lib]
          name = "$APP_NAME"
          crate-type = ["cdylib", "staticlib"]
          
          [build-dependencies]
          tauri-build = "2.1.1"
          
          [dependencies]
          tauri = { version = "2.11.2", features = ["shell-open"] }
          serde = { version = "1", features = ["derive"] }
          serde_json = "1"
          
          [features]
          default = ["custom-protocol"]
          custom-protocol = ["tauri/custom-protocol"]
          EOF
          
          # 创建 src-tauri/build.rs
          cat > tmpapp/src-tauri/build.rs << EOF
          fn main() {
              tauri_build::build()
          }
          EOF
          
          # 创建 src-tauri/src/lib.rs
          cat > tmpapp/src-tauri/src/lib.rs << EOF
          #[cfg_attr(mobile, tauri::mobile_entry_point)]
          pub fn run() {
              tauri::Builder::default()
                  .run(tauri::generate_context!())
                  .expect("error while running tauri application");
          }
          EOF
          
          # 创建 src-tauri/src/main.rs
          cat > tmpapp/src-tauri/src/main.rs << EOF
          #![cfg_attr(not(debug_assertions), windows_subsystem = "windows")]
          fn main() {
              app_lib::run();
          }
          EOF
          
          # 创建 tauri.conf.json
          cat > tmpapp/src-tauri/tauri.conf.json << EOF
          {
            "productName": "$APP_NAME",
            "version": "$VERSION",
            "identifier": "$BUNDLE_ID",
            "build": {
              "frontendDist": "../src",
              "beforeDevCommand": null,
              "beforeBuildCommand": null
            },
            "app": {
              "windows": [
                {
                  "title": "$APP_NAME",
                  "width": 1200,
                  "height": 800,
                  "resizable": true,
                  "fullscreen": false
                }
              ],
              "security": {
                "csp": null
              }
            },
            "bundle": {
              "active": true,
              "targets": ["nsis", "msi"],
              "icon": [
                "icons/32x32.png",
                "icons/128x128.png",
                "icons/128x128@2x.png",
                "icons/icon.icns",
                "icons/icon.ico"
              ]
            }
          }
          EOF
          
          cd tmpapp
          npm install
          npm run tauri build
          
          mkdir artifacts
          cp src-tauri/target/release/bundle/nsis/*.exe artifacts/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/msi/*.msi artifacts/ 2>/dev/null || true
          echo "✅ Windows build completed"
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: tmpapp/artifacts/*

