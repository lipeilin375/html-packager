              "beforeDevCommand": null,
              "beforeBuildCommand": null
            },
            "app": {
              "windows": [
                {
                  "title": "$APP_NAME",
                  "width": 1200,
                  "height": 800,
                  "resizable": true,
                  "fullscreen": false
                }
              ],
              "security": {
                "csp": null
              }
            },
            "bundle": {
              "active": true,
              "targets": ["deb", "appimage"],
              "icon": [
                "icons/32x32.png",
