      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-bundle
          path: tmpapp/artifacts/*

  # ===================== Release =====================
  release:
    needs: [setup, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: always() && (needs.build-windows.result == 'success' || needs.build-linux.result == 'success' || needs.build-macos.result == 'success')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_bundles
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.setup.outputs.app_name }}-v${{ needs.setup.outputs.version }}-${{ needs.setup.outputs.build_id }}
          name: "${{ needs.setup.outputs.app_name }} v${{ needs.setup.outputs.version }}"
          body: "自动打包生成的应用，基于 Tauri 2.0。"
          draft: false
          prerelease: false
          files: |
            all_bundles/**/*.exe
            all_bundles/**/*.msi
            all_bundles/**/*.deb
            all_bundles/**/*.AppImage
            all_bundles/**/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
