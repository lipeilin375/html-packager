name: Tauri Static Website Builder

on:
  workflow_dispatch:
    inputs:
      metadata_file:
        description: '上传的元数据文件路径 (upload/build-*.json)'
        required: true
        type: string

env:
  TAURI_PRIVATE_KEY: ''
  TAURI_KEY_PASSWORD: ''

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      app_name: ${{ steps.meta.outputs.app_name }}
      version: ${{ steps.meta.outputs.version }}
      platforms: ${{ steps.meta.outputs.platforms }}
      build_id: ${{ steps.meta.outputs.build_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read metadata
        id: meta
        run: |
          METADATA=$(cat ${{ github.event.inputs.metadata_file }})
          APP_NAME=$(echo "$METADATA" | jq -r '.app_name')
          VERSION=$(echo "$METADATA" | jq -r '.version')
          PLATFORMS=$(echo "$METADATA" | jq -c '.platforms')
          BUILD_ID=$(echo "$METADATA" | jq -r '.timestamp')
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "platforms=$PLATFORMS" >> $GITHUB_OUTPUT
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "METADATA_FILE=${{ github.event.inputs.metadata_file }}" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download & extract website zip
        run: |
          ZIP_PATH=$(jq -r '.zip_file' ${{ github.event.inputs.metadata_file }})
          mkdir -p website_src
          curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
               -H "Accept: application/vnd.github.v3.raw" \
               -L "https://api.github.com/repos/${{ github.repository }}/contents/${ZIP_PATH}" -o upload.zip
          if [ ! -s upload.zip ]; then
            echo "ERROR: Downloaded zip file is empty or missing"
            exit 1
          fi
          unzip -q upload.zip -d website_src
          # 处理单层文件夹
          if [ $(ls -1 website_src | wc -l) -eq 1 ] && [ -d "website_src/$(ls website_src)" ]; then
            mv website_src/*/* website_src/
          fi
          if [ ! -f website_src/index.html ]; then
            echo "ERROR: No index.html found"
            exit 1
          fi
          echo "✅ Website extracted"

      - name: Generate Tauri icons
        run: |
          npm install -g @tauri-apps/cli@latest
          ICON_PATH=$(jq -r '.icon_file' ${{ github.event.inputs.metadata_file }})
          curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
               -H "Accept: application/vnd.github.v3.raw" \
               -L "https://api.github.com/repos/${{ github.repository }}/contents/${ICON_PATH}" -o input_icon.png
          if [ ! -f input_icon.png ]; then
            echo "ERROR: Icon download failed"
            exit 1
          fi
          mkdir -p generated_icons
          npx tauri icon input_icon.png -o generated_icons
          if [ ! -d generated_icons ] || [ -z "$(ls -A generated_icons)" ]; then
            echo "ERROR: Icon generation failed"
            exit 1
          fi
          echo "✅ Icons generated"

      - name: Prepare Tauri resources artifact
        run: |
          mkdir -p tauri_resources/src
          mkdir -p tauri_resources/icons
          cp -r website_src/* tauri_resources/src/
          cp -r generated_icons/* tauri_resources/icons/
          cp ${{ github.event.inputs.metadata_file }} tauri_resources/build_metadata.json
          tar -czf resources.tar.gz -C tauri_resources .
          echo "✅ Resources prepared"

      - name: Upload resources artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauri-resources
          path: resources.tar.gz

  # ===================== Windows =====================
  build-windows:
    needs: setup
    if: contains(fromJson(needs.setup.outputs.platforms), 'windows')
    runs-on: windows-latest
    steps:
      - name: Download resources
        uses: actions/download-artifact@v4
        with:
          name: tauri-resources
      - name: Extract resources
        run: tar -xzf resources.tar.gz
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build Tauri app (Windows)
        shell: bash
        run: |
          APP_NAME=$(jq -r '.app_name' build_metadata.json)
          VERSION=$(jq -r '.version' build_metadata.json)
          BUNDLE_ID=$(jq -r '.bundle_id' build_metadata.json)
          PLATFORMS=$(jq -r '.platforms' build_metadata.json)
          
          npm create tauri-app@latest tmpapp -- --template vanilla --manager npm --yes
          
          rm -rf tmpapp/src/*
          cp -r src/* tmpapp/src/
          rm -rf tmpapp/src-tauri/icons/*
          cp -r icons/* tmpapp/src-tauri/icons/
          
          cd tmpapp
          npm install
          
          # 修改配置 (Tauri 2.0)
          npx json -I -f src-tauri/tauri.conf.json -e "this.productName='$APP_NAME'"
          npx json -I -f src-tauri/tauri.conf.json -e "this.version='$VERSION'"
          npx json -I -f src-tauri/tauri.conf.json -e "this.identifier='$BUNDLE_ID'"
          npx json -I -f src-tauri/tauri.conf.json -e "this.build.frontendDist='./src'"
          npx json -I -f src-tauri/tauri.conf.json -e "this.build.beforeDevCommand=null"
          npx json -I -f src-tauri/tauri.conf.json -e "this.build.beforeBuildCommand=null"
          # 删除不允许的 devPath 字段
          npx json -I -f src-tauri/tauri.conf.json -e "delete this.build.devPath"
          
          TARGETS='["nsis","msi"]'
          npx json -I -f src-tauri/tauri.conf.json -e "this.bundle.active=true"
          npx json -I -f src-tauri/tauri.conf.json -e "this.bundle.targets=$TARGETS"
          
          npm run tauri build
          mkdir artifacts
          cp src-tauri/target/release/bundle/nsis/*.exe artifacts/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/msi/*.msi artifacts/ 2>/dev/null || true
          echo "✅ Windows build completed"
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: tmpapp/artifacts/*

  # ===================== Linux =====================
  build-linux:
    needs: setup
    if: contains(fromJson(needs.setup.outputs.platforms), 'linux')
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Download resources
        uses: actions/download-artifact@v4
        with:
          name: tauri-resources
      - name: Extract resources
        run: tar -xzf resources.tar.gz
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build Tauri app (Linux)
        run: |
          APP_NAME=$(jq -r '.app_name' build_metadata.json)
          VERSION=$(jq -r '.version' build_metadata.json)
          BUNDLE_ID=$(jq -r '.bundle_id' build_metadata.json)
          
          npm create tauri-app@latest tmpapp -- --template vanilla --manager npm --yes
          
          rm -rf tmpapp/src/*
          cp -r src/* tmpapp/src/
          rm -rf tmpapp/src-tauri/icons/*
          cp -r icons/* tmpapp/src-tauri/icons/
          
          cd tmpapp
          npm install
          
          npx json -I -f src-tauri/tauri.conf.json -e "this.productName='$APP_NAME'"
          npx json -I -f src-tauri/tauri.conf.json -e "this.version='$VERSION'"
          npx json -I -f src-tauri/tauri.conf.json -e "this.identifier='$BUNDLE_ID'"
          npx json -I -f src-tauri/tauri.conf.json -e "this.build.frontendDist='./src'"
          npx json -I -f src-tauri/tauri.conf.json -e "this.build.beforeDevCommand=null"
          npx json -I -f src-tauri/tauri.conf.json -e "this.build.beforeBuildCommand=null"
          npx json -I -f src-tauri/tauri.conf.json -e "delete this.build.devPath"
          
          TARGETS='["deb","appimage"]'
          npx json -I -f src-tauri/tauri.conf.json -e "this.bundle.active=true"
          npx json -I -f src-tauri/tauri.conf.json -e "this.bundle.targets=$TARGETS"
          
          npm run tauri build
          mkdir artifacts
          cp src-tauri/target/release/bundle/deb/*.deb artifacts/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/appimage/*.AppImage artifacts/ 2>/dev/null || true
          echo "✅ Linux build completed"
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: tmpapp/artifacts/*

  # ===================== macOS =====================
  build-macos:
    needs: setup
    if: contains(fromJson(needs.setup.outputs.platforms), 'macos')
    runs-on: macos-latest
    steps:
      - name: Download resources
        uses: actions/download-artifact@v4
        with:
          name: tauri-resources
      - name: Extract resources
        run: tar -xzf resources.tar.gz
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build Tauri app (macOS)
        run: |
          APP_NAME=$(jq -r '.app_name' build_metadata.json)
          VERSION=$(jq -r '.version' build_metadata.json)
          BUNDLE_ID=$(jq -r '.bundle_id' build_metadata.json)
          
          npm create tauri-app@latest tmpapp -- --template vanilla --manager npm --yes
          
          rm -rf tmpapp/src/*
          cp -r src/* tmpapp/src/
          rm -rf tmpapp/src-tauri/icons/*
          cp -r icons/* tmpapp/src-tauri/icons/
          
          cd tmpapp
          npm install
          
          npx json -I -f src-tauri/tauri.conf.json -e "this.productName='$APP_NAME'"
          npx json -I -f src-tauri/tauri.conf.json -e "this.version='$VERSION'"
          npx json -I -f src-tauri/tauri.conf.json -e "this.identifier='$BUNDLE_ID'"
          npx json -I -f src-tauri/tauri.conf.json -e "this.build.frontendDist='./src'"
          npx json -I -f src-tauri/tauri.conf.json -e "this.build.beforeDevCommand=null"
          npx json -I -f src-tauri/tauri.conf.json -e "this.build.beforeBuildCommand=null"
          npx json -I -f src-tauri/tauri.conf.json -e "delete this.build.devPath"
          
          TARGETS='["dmg"]'
          npx json -I -f src-tauri/tauri.conf.json -e "this.bundle.active=true"
          npx json -I -f src-tauri/tauri.conf.json -e "this.bundle.targets=$TARGETS"
          
          npm run tauri build
          mkdir artifacts
          cp src-tauri/target/release/bundle/dmg/*.dmg artifacts/ 2>/dev/null || true
          echo "✅ macOS build completed"
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-bundle
          path: tmpapp/artifacts/*

  # ===================== Release =====================
  release:
    needs: [setup, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: always() && (needs.build-windows.result == 'success' || needs.build-linux.result == 'success' || needs.build-macos.result == 'success')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_bundles
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.setup.outputs.app_name }}-v${{ needs.setup.outputs.version }}-${{ needs.setup.outputs.build_id }}
          name: "${{ needs.setup.outputs.app_name }} v${{ needs.setup.outputs.version }}"
          body: "自动打包生成的应用，基于 Tauri 2.0。"
          draft: false
          prerelease: false
          files: |
            all_bundles/**/*.exe
            all_bundles/**/*.msi
            all_bundles/**/*.deb
            all_bundles/**/*.AppImage
            all_bundles/**/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
