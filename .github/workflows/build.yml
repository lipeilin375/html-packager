name: Tauri Build System

on:
  workflow_dispatch:
    inputs:
      job:
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: tauri-build-${{ github.event.inputs.job }}
  cancel-in-progress: false


jobs:

  prepare:
    runs-on: ubuntu-latest

    outputs:
      job: ${{ steps.meta.outputs.job }}
      name: ${{ steps.meta.outputs.name }}
      version: ${{ steps.meta.outputs.version }}
      identifier: ${{ steps.meta.outputs.identifier }}

    steps:
      - uses: actions/checkout@v4

      - name: Read Job File
        id: meta
        run: |
          JOB="${{ github.event.inputs.job }}"
          FILE="upload/jobs/${JOB}.json"

          echo "job=$JOB" >> $GITHUB_OUTPUT

          NAME=$(jq -r '.name' "$FILE")
          VERSION=$(jq -r '.version' "$FILE")
          IDENTIFIER=$(jq -r '.identifier' "$FILE")

          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "identifier=$IDENTIFIER" >> $GITHUB_OUTPUT


  build:
    needs: prepare

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos

    runs-on: ${{ matrix.os }}

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev \
            build-essential curl wget file \
            libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Create workspace
        run: mkdir -p app

      - name: Init npm
        working-directory: app
        run: npm init -y

      - name: Install deps
        working-directory: app
        run: npm install @tauri-apps/api @tauri-apps/cli unzipper

      # ✅ 核心修复：不再 inline node -e
      - name: Create extract script
        run: |
          mkdir -p scripts
          cat > scripts/extract.js <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const unzipper = require('unzipper');

          const job = process.env.JOB;
          const zipPath = path.resolve(`upload/html/${job}.zip`);
          const outDir = path.resolve('app/dist');

          if (!fs.existsSync(zipPath)) {
            console.error('ZIP not found:', zipPath);
            process.exit(1);
          }

          fs.mkdirSync(outDir, { recursive: true });

          fs.createReadStream(zipPath)
            .pipe(unzipper.Extract({ path: outDir }))
            .on('close', () => console.log('Extract done'))
            .on('error', err => {
              console.error(err);
              process.exit(1);
            });
          EOF

      - name: Extract HTML (stable)
        env:
          JOB: ${{ github.event.inputs.job }}
        run: node scripts/extract.js

      - name: Generate icons
        run: |
          mkdir -p app/icons

          ICON="upload/icons/${{ github.event.inputs.job }}.png"

          if [ -f "$ICON" ]; then
            npx tauri icon "$ICON" --output app/icons || true
          else
            echo "skip icon"
          fi

      - name: Generate tauri config
        working-directory: app
        run: |
          cat > tauri.conf.json <<EOF
          {
            "productName": "${{ needs.prepare.outputs.name }}",
            "version": "${{ needs.prepare.outputs.version }}",
            "identifier": "${{ needs.prepare.outputs.identifier }}",
            "build": {
              "frontendDist": "../dist"
            },
            "bundle": {
              "active": true,
              "targets": ["all"],
              "icon": [
                "icons/icon.png",
                "icons/icon.ico",
                "icons/icon.icns"
              ]
            }
          }
          EOF

      - name: Build app
        working-directory: app
        run: npx tauri build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: app/src-tauri/target/release/bundle/**/*
