name: Build and Release Tauri App

on:
  workflow_dispatch:
    inputs:
      zip_file:
        description: 'Path to uploaded zip (e.g. upload/1700000000/archive.zip)'
        required: true
      icon_file:
        description: 'Path to icon (e.g. upload/1700000000/icon.png)'
        required: true
      app_name:
        description: 'Application name'
        required: true
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
      package_name:
        description: 'Identifier (e.g. com.example.app)'
        required: true
      platforms:
        description: 'Comma-separated: windows,macos,linux'
        required: true
        default: 'windows,macos,linux'

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Generate build matrix
        id: set-matrix
        run: |
          PLATFORMS="${{ inputs.platforms }}"
          # 初始化空矩阵
          MATRIX='{"include":[]}'
          IFS=',' read -ra PLAT <<< "$PLATFORMS"
          for p in "${PLAT[@]}"; do
            case $p in
              windows)
                MATRIX=$(jq -c '.include += [{"os":"windows-latest","platform":"windows","bundles":"msi,nsis"}]' <<< "$MATRIX")
                ;;
              macos)
                MATRIX=$(jq -c '.include += [{"os":"macos-latest","platform":"macos","bundles":"dmg"}]' <<< "$MATRIX")
                ;;
              linux)
                MATRIX=$(jq -c '.include += [{"os":"ubuntu-latest","platform":"linux","bundles":"deb,appimage"}]' <<< "$MATRIX")
                ;;
            esac
          done
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  build:
    needs: setup-matrix
    strategy:
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf

      - name: Prepare build directory
        run: |
          mkdir -p build/dist
          unzip -o "${{ inputs.zip_file }}" -d build/dist
          cp "${{ inputs.icon_file }}" build/icon.png
          if [ ! -f build/dist/index.html ]; then
            echo "::warning::No index.html found in zip root"
          fi

      - name: Initialize Tauri v2 project
        working-directory: build
        run: |
          npm init -y
          npm install --save-dev @tauri-apps/cli
          # 使用 --ci 跳过所有交互询问
          npx tauri init \
            --ci \
            --app-name "${{ inputs.app_name }}" \
            --window-title "${{ inputs.app_name }}" \
            --frontend-dist ../dist \
            --dev-url "" \
            --identifier "${{ inputs.package_name }}"

      - name: Generate icons
        working-directory: build
        run: npx tauri icon icon.png

      - name: Update Tauri config
        working-directory: build
        run: |
          node -e "
            const fs = require('fs');
            const configPath = 'src-tauri/tauri.conf.json';
            const config = JSON.parse(fs.readFileSync(configPath, 'utf8'));
            config.version = '${{ inputs.version }}';
            config.bundle.targets = '${{ matrix.bundles }}'.split(',');
            config.identifier = '${{ inputs.package_name }}';
            config.productName = '${{ inputs.app_name }}';
            // 允许未签名打包
            config.bundle.macOS = { signingIdentity: null };
            config.bundle.windows = { signingIdentity: null };
            fs.writeFileSync(configPath, JSON.stringify(config, null, 2));
          "

      - name: Install npm dependencies
        working-directory: build
        run: npm install

      - name: Build Tauri
        working-directory: build
        run: npx tauri build --bundles ${{ matrix.bundles }}

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find build/src-tauri/target/release/bundle -type f \
            \( -name "*.msi" -o -name "*.exe" -o -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" \) \
            -exec cp {} artifacts/ \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: artifacts/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
