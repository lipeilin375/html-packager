name: Tauri Cleanup & Queue Manager

on:
  schedule:
    - cron: "0 */6 * * *"   # 每6小时执行一次
  workflow_dispatch:

permissions:
  contents: write

jobs:

  cleanup:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Setup tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      # =========================
      # 1. 清理过期 upload 文件
      # =========================
      - name: Clean Upload Cache
        run: |

          echo "🧹 Cleaning upload cache..."

          find upload/html -type f -mtime +1 -delete || true
          find upload/icons -type f -mtime +1 -delete || true

          # job 文件保留，但标记失败/过期
          find upload/jobs/pending -type f -mtime +2 -print | while read f; do
            echo "⚠️ stale job: $f"
          done

      # =========================
      # 2. 标记超时任务（队列控制核心）
      # =========================
      - name: Mark Stale Jobs
        run: |

          echo "🚦 Checking stale jobs..."

          for file in upload/jobs/pending/*.json; do

            [ -f "$file" ] || continue

            CREATED=$(jq -r '.createdAt' "$file")

            NOW=$(date -u +%s)
            CREATED_TS=$(date -u -d "$CREATED" +%s || echo 0)

            DIFF=$((NOW - CREATED_TS))

            # 超过30分钟仍pending → 标记失败
            if [ "$DIFF" -gt 1800 ]; then

              echo "❌ marking failed: $file"

              jq '.status="failed"' "$file" > tmp.json
              mv tmp.json "$file"
            fi

          done

      # =========================
      # 3. 控制队列长度（防止爆炸）
      # =========================
      - name: Queue Control
        run: |

          echo "🚦 Queue control..."

          PENDING_COUNT=$(ls upload/jobs/pending 2>/dev/null | wc -l)

          echo "Pending jobs: $PENDING_COUNT"

          # 超过50个待处理任务 → 自动拒绝新任务
          if [ "$PENDING_COUNT" -gt 50 ]; then

            echo "⚠️ queue overflow detected"

            for file in upload/jobs/pending/*.json; do
              [ -f "$file" ] || continue

              jq '.status="rejected", .reason="queue overflow"' "$file" > tmp.json
              mv tmp.json "$file"
            done

          fi

      # =========================
      # 4. 清理已完成 release 索引冗余
      # =========================
      - name: Optimize Release Index
        run: |

          echo "📦 optimizing releases/index.json..."

          FILE="releases/index.json"

          [ -f "$FILE" ] || exit 0

          # 去重 + 保留最新 100 条
          jq 'unique_by(.id) | sort_by(.id) | reverse | .[:100]' "$FILE" > tmp.json

          mv tmp.json "$FILE"

      # =========================
      # 5. 自动提交更改
      # =========================
      - name: Commit cleanup changes
        run: |

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add upload releases

          if git diff --cached --quiet; then
            echo "✅ No changes"
            exit 0
          fi

          git commit -m "🧹 cleanup: optimize jobs & queue"
          git push